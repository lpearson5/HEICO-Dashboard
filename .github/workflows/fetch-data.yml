name: Fetch EDGAR Data

on:
  schedule:
    - cron: "0 14 * * 1"  # Mondays at 2pm UTC (10am Eastern)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: self-hosted   # runs on your PC so EDGAR doesn't block it
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch EDGAR 13F data
        shell: powershell
        run: node scripts/fetch-edgar.mjs

      - name: Commit updated data files
        shell: powershell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hei.json data/heia.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            $date = Get-Date ([datetime]::UtcNow) -Format 'yyyy-MM-dd'
            git commit -m "chore: refresh EDGAR 13F data $date"
            git push
          } else {
            Write-Host "No changes to commit"
          }
