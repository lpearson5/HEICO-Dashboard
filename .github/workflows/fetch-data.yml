name: Fetch EDGAR Data

on:
  schedule:
    # Run every day at 06:00 UTC (after US market open)
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch EDGAR 13F data
        run: node scripts/fetch-edgar.mjs

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hei.json data/heia.json
          git diff --cached --quiet || git commit -m "chore: refresh EDGAR 13F data $(date -u +%Y-%m-%d)"
          git push
